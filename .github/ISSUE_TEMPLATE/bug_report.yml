name: Bug report
description: Report something broken or confusing
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Agent/runtime, OS, Python version, and relevant command output.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have not included a real private CV, secrets, or personal contact data.
          required: true
