name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate JSON schemas
        run: |
          python -m json.tool schemas/candidate-profile.schema.json >/dev/null
          python -m json.tool schemas/search-criteria.schema.json >/dev/null
          python -m json.tool schemas/source-inventory.schema.json >/dev/null
          python -m json.tool schemas/workspace-config.schema.json >/dev/null

      - name: Initialize and validate demo workspace
        run: |
          python scripts/init_workspace.py --workspace ./demo-workspace --force
          python scripts/validate_workspace.py ./demo-workspace
